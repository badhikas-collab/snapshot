<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snapshot List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #080b10;
    --card:       #0d1117;
    --card2:      #131920;
    --card3:      #171f2a;
    --border:     #1e2a38;
    --border2:    #253347;
    --cyan:       #00e5ff;
    --cyan-dim:   rgba(0,229,255,0.08);
    --cyan-glow:  rgba(0,229,255,0.22);
    --lime:       #b8ff57;
    --lime-dim:   rgba(184,255,87,0.07);
    --amber:      #ffb830;
    --amber-dim:  rgba(255,184,48,0.08);
    --red:        #ff4d6a;
    --txt:        #dde6f0;
    --txt2:       #6b8099;
    --txt3:       #3a4f63;
    --mono:       'JetBrains Mono', monospace;
    --display:    'Syne', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background-image:
      linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .layout {
    width: 100%;
    max-width: 860px;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    min-height: 580px;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .sidebar-topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .topbar-dots { display:flex; gap:5px; }
  .topbar-dots span {
    width:9px; height:9px;
    border-radius:50%;
    background: var(--border2);
  }

  .sidebar-title {
    font-size: 10px;
    color: var(--txt2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-left: 2px;
  }

  .back-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--txt2);
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 9px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.15s;
  }
  .back-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  /* Search */
  .sidebar-search {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 26px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--txt3);
    font-size: 11px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px 8px 28px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--txt);
    outline: none;
    caret-color: var(--cyan);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input::placeholder { color: var(--txt3); }
  .search-input:focus {
    border-color: rgba(0,229,255,0.35);
    box-shadow: 0 0 0 3px var(--cyan-dim);
  }

  /* Stats row */
  .sidebar-stats {
    display: flex;
    padding: 10px 14px;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .sstat {
    flex: 1;
    text-align: center;
    padding: 4px 0;
  }
  .sstat + .sstat {
    border-left: 1px solid var(--border);
  }
  .sstat-val {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: var(--cyan);
    font-variant-numeric: tabular-nums;
  }
  .sstat-lbl {
    display: block;
    font-size: 9px;
    color: var(--txt3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Snapshot list */
  .snap-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  .snap-group-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--txt3);
    padding: 8px 6px 6px;
  }

  .snap-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 3px;
    position: relative;
  }

  .snap-item:hover {
    background: var(--card2);
    border-color: var(--border);
  }

  .snap-item.active {
    background: var(--cyan-dim);
    border-color: rgba(0,229,255,0.25);
  }

  .snap-item.active .snap-name { color: var(--cyan); }
  .snap-item.active .snap-indicator { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }

  .snap-indicator {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border2);
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .snap-item:hover .snap-indicator { background: var(--txt2); }

  .snap-info { flex: 1; min-width: 0; }

  .snap-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--txt);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
    transition: color 0.15s;
  }

  .snap-meta {
    font-size: 10px;
    color: var(--txt3);
    margin-top: 2px;
    display: block;
  }

  .snap-arrow {
    font-size: 12px;
    color: var(--txt3);
    opacity: 0;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .snap-item:hover .snap-arrow,
  .snap-item.active .snap-arrow {
    opacity: 1;
    color: var(--cyan);
  }

  /* loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--card2) 25%, var(--card3) 50%, var(--card2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .snap-list::-webkit-scrollbar { width: 4px; }
  .snap-list::-webkit-scrollbar-track { background: transparent; }
  .snap-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── MAIN PANEL ── */
  .main-panel {
    display: flex;
    flex-direction: column;
  }

  .main-topbar {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
    gap: 10px;
  }

  .breadcrumb {
    font-size: 11px;
    color: var(--txt2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .breadcrumb .sep { color: var(--txt3); }
  .breadcrumb .current { color: var(--txt); }

  .main-topbar-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }

  .action-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--txt2);
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--border2); color: var(--txt); }
  .action-btn.danger:hover { border-color: var(--red); color: var(--red); }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px;
  }

  .empty-icon {
    width: 52px; height: 52px;
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--txt3);
    margin-bottom: 4px;
  }

  .empty-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    color: var(--txt2);
  }

  .empty-sub {
    font-size: 11px;
    color: var(--txt3);
    text-align: center;
    line-height: 1.7;
    max-width: 240px;
  }

  /* Detail state */
  .detail-state {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    animation: fadeUp 0.2s ease;
  }
  .detail-state.show { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .detail-hero {
    padding: 24px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  .detail-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--txt3);
    margin-bottom: 6px;
  }

  .detail-name {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    color: var(--txt);
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }

  .detail-timestamp {
    font-size: 11px;
    color: var(--txt2);
    margin-bottom: 14px;
  }

  .integrity-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--lime-dim);
    border: 1px solid rgba(184,255,87,0.15);
    border-radius: 4px;
    padding: 5px 10px;
    font-size: 10px;
    color: var(--lime);
    letter-spacing: 0.04em;
  }

  /* Quick stats */
  .detail-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .dstat {
    background: var(--card);
    padding: 16px 20px;
    transition: background 0.15s;
  }
  .dstat:hover { background: var(--card2); }

  .dstat-val {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 800;
    color: var(--cyan);
    display: block;
    margin-bottom: 3px;
  }
  .dstat-lbl {
    font-size: 9px;
    color: var(--txt3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: block;
  }

  /* Info rows */
  .detail-body {
    padding: 20px 24px;
    flex: 1;
  }

  .info-section-title {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--txt3);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .info-rows {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }

  .info-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 11px;
    transition: border-color 0.15s;
  }
  .info-row:hover { border-color: var(--border2); }

  .info-row-key { color: var(--txt2); }
  .info-row-val { color: var(--txt); font-weight: 500; }
  .info-row-val.accent { color: var(--cyan); }

  /* Load animation on click */
  .load-flash {
    animation: loadFlash 0.25s ease;
  }
  @keyframes loadFlash {
    0%   { opacity: 0.4; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">
    <div class="sidebar-topbar">
      <div class="topbar-dots"><span></span><span></span><span></span></div>
      <span class="sidebar-title">snapshots</span>
      <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
    </div>

    <div class="sidebar-search">
      <span class="search-icon">/</span>
      <input class="search-input" id="searchInput" type="text" placeholder="filter snapshots..." autocomplete="off" spellcheck="false" />
    </div>

    <div class="sidebar-stats">
      <div class="sstat">
        <span class="sstat-val" id="totalCount">—</span>
        <span class="sstat-lbl">Total</span>
      </div>
      <div class="sstat">
        <span class="sstat-val" id="todayCount">—</span>
        <span class="sstat-lbl">Today</span>
      </div>
      <div class="sstat">
        <span class="sstat-val" id="latestAge">—</span>
        <span class="sstat-lbl">Latest</span>
      </div>
    </div>

    <div class="snap-list" id="snapList">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- ── MAIN PANEL ── -->
  <div class="main-panel">
    <div class="main-topbar">
      <div class="breadcrumb">
        <span>snapshots</span>
        <span class="sep">/</span>
        <span class="current" id="breadcrumbCurrent">select one</span>
      </div>
      <div class="main-topbar-actions" id="topbarActions" style="display:none">
        <button class="action-btn" id="compareActionBtn">Compare</button>
        <button class="action-btn" id="uploadActionBtn">↑ Upload</button>
        <button class="action-btn danger" id="deleteActionBtn">✕ Delete</button>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">◫</div>
      <div class="empty-title">No snapshot selected</div>
      <div class="empty-sub">Click any snapshot in the list to instantly load it here.</div>
    </div>

    <!-- Detail state -->
    <div class="detail-state" id="detailState">
      <div class="detail-hero">
        <div class="detail-label">Snapshot</div>
        <div class="detail-name" id="detailName">—</div>
        <div class="detail-timestamp" id="detailTimestamp">—</div>
        <div class="integrity-badge" id="integrityBadge" style="display:none">
          🔒 SHA256: <span id="checksumShort">—</span>
        </div>
      </div>

      <div class="detail-stats">
        <div class="dstat">
          <span class="dstat-val" id="dstatCpu">—</span>
          <span class="dstat-lbl">CPU Cores</span>
        </div>
        <div class="dstat">
          <span class="dstat-val" id="dstatMem">—</span>
          <span class="dstat-lbl">Memory GB</span>
        </div>
        <div class="dstat">
          <span class="dstat-val" id="dstatProcs">—</span>
          <span class="dstat-lbl">Processes</span>
        </div>
      </div>

      <div class="detail-body">
        <div class="info-section-title">System</div>
        <div class="info-rows">
          <div class="info-row">
            <span class="info-row-key">CPU</span>
            <span class="info-row-val accent" id="infocpu">—</span>
          </div>
          <div class="info-row">
            <span class="info-row-key">OS</span>
            <span class="info-row-val" id="infoos">—</span>
          </div>
          <div class="info-row">
            <span class="info-row-key">Disk</span>
            <span class="info-row-val" id="infodisk">—</span>
          </div>
          <div class="info-row">
            <span class="info-row-key">Open Ports</span>
            <span class="info-row-val accent" id="infoports">—</span>
          </div>
          <div class="info-row">
            <span class="info-row-key">Network Interfaces</span>
            <span class="info-row-val" id="infonifaces">—</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Demo data (replace with real ipc.invoke calls in Electron) ──
  const DEMO_SNAPSHOTS = [
    {
      name: 'baseline_before_deploy',
      timestamp: new Date(Date.now() - 1000*60*8).toISOString(),
      system: { cpu_brand:'Apple M4', cpu_cores:10, total_memory_gb:'24.00', os_distro:'macOS', os_release:'15.3', total_disk_size_gb:'465.92' },
      network: { listening_ports: Array(18), interfaces: Array(4) },
      running_processes: Array(201),
      integrity: { sha256_checksum: 'a3f9c1e2b8d047561f3a9c2e1b8047d5a3f9c1e2b8d047561f3a9c2e1b804' }
    },
    {
      name: 'after_npm_install',
      timestamp: new Date(Date.now() - 1000*60*32).toISOString(),
      system: { cpu_brand:'Apple M4', cpu_cores:10, total_memory_gb:'24.00', os_distro:'macOS', os_release:'15.3', total_disk_size_gb:'465.92' },
      network: { listening_ports: Array(22), interfaces: Array(4) },
      running_processes: Array(214),
      integrity: { sha256_checksum: 'b7d2f4a1c9e3058672e4b1f3a9d2c0857b7d2f4a1c9e3058672e4b1f3a9d' }
    },
    {
      name: 'snapshot_1772822117701',
      timestamp: new Date(Date.now() - 1000*60*60*2).toISOString(),
      system: { cpu_brand:'Apple M4', cpu_cores:10, total_memory_gb:'24.00', os_distro:'macOS', os_release:'15.3', total_disk_size_gb:'465.92' },
      network: { listening_ports: Array(19), interfaces: Array(5) },
      running_processes: Array(198),
      integrity: { sha256_checksum: 'c8e3a5b2d1f40697831f5c2e4b1a3d08c8e3a5b2d1f40697831f5c2e4b1a' }
    },
    {
      name: 'pre_update_check',
      timestamp: new Date(Date.now() - 1000*60*60*5).toISOString(),
      system: { cpu_brand:'Apple M4', cpu_cores:10, total_memory_gb:'24.00', os_distro:'macOS', os_release:'15.3', total_disk_size_gb:'465.92' },
      network: { listening_ports: Array(17), interfaces: Array(4) },
      running_processes: Array(189),
      integrity: { sha256_checksum: 'd9f4b6c3e2a51708942a6d3f5c2b4e19d9f4b6c3e2a51708942a6d3f5c2b' }
    },
    {
      name: 'morning_baseline',
      timestamp: new Date(Date.now() - 1000*60*60*18).toISOString(),
      system: { cpu_brand:'Apple M4', cpu_cores:10, total_memory_gb:'24.00', os_distro:'macOS', os_release:'15.3', total_disk_size_gb:'465.92' },
      network: { listening_ports: Array(15), interfaces: Array(3) },
      running_processes: Array(177),
      integrity: { sha256_checksum: 'e0a5c7d4f3b62819053b7e4a6d3c5f2a0e0a5c7d4f3b62819053b7e4a6d3' }
    },
  ];

  let snapshots = [];
  let activeSnap = null;

  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    const h = Math.floor(m / 60);
    const d = Math.floor(h / 24);
    if (m < 1)  return 'just now';
    if (m < 60) return `${m}m ago`;
    if (h < 24) return `${h}h ago`;
    return `${d}d ago`;
  }

  function isToday(iso) {
    const d = new Date(iso);
    const n = new Date();
    return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
  }

  function renderList(filter = '') {
    const list = document.getElementById('snapList');
    list.innerHTML = '';

    const filtered = snapshots.filter(s =>
      s.name.toLowerCase().includes(filter.toLowerCase())
    );

    if (filtered.length === 0) {
      list.innerHTML = `<div style="padding:20px;text-align:center;font-size:11px;color:var(--txt3)">No matches</div>`;
      return;
    }

    // Group: Today vs Earlier
    const today    = filtered.filter(s => isToday(s.timestamp));
    const earlier  = filtered.filter(s => !isToday(s.timestamp));

    const renderGroup = (label, items) => {
      if (items.length === 0) return;
      const lbl = document.createElement('div');
      lbl.className = 'snap-group-label';
      lbl.textContent = label;
      list.appendChild(lbl);

      items.forEach(snap => {
        const el = document.createElement('div');
        el.className = `snap-item ${activeSnap?.name === snap.name ? 'active' : ''}`;
        el.innerHTML = `
          <div class="snap-indicator"></div>
          <div class="snap-info">
            <span class="snap-name">${snap.name}</span>
            <span class="snap-meta">${timeAgo(snap.timestamp)}</span>
          </div>
          <span class="snap-arrow">›</span>
        `;
        el.addEventListener('click', () => loadSnap(snap));
        list.appendChild(el);
      });
    };

    renderGroup('Today', today);
    renderGroup('Earlier', earlier);
  }

  function loadSnap(snap) {
    activeSnap = snap;
    renderList(document.getElementById('searchInput').value);

    // Update breadcrumb
    document.getElementById('breadcrumbCurrent').textContent = snap.name;
    document.getElementById('topbarActions').style.display = 'flex';

    // Swap panels
    document.getElementById('emptyState').style.display = 'none';
    const detail = document.getElementById('detailState');
    detail.classList.remove('show');
    // force reflow for animation replay
    void detail.offsetWidth;
    detail.classList.add('show');

    // Populate
    document.getElementById('detailName').textContent = snap.name;
    document.getElementById('detailTimestamp').textContent =
      new Date(snap.timestamp).toLocaleString() + '  ·  ' + timeAgo(snap.timestamp);

    if (snap.integrity) {
      const badge = document.getElementById('integrityBadge');
      badge.style.display = 'inline-flex';
      document.getElementById('checksumShort').textContent =
        snap.integrity.sha256_checksum.substring(0, 16) + '…';
    }

    document.getElementById('dstatCpu').textContent   = snap.system.cpu_cores;
    document.getElementById('dstatMem').textContent   = snap.system.total_memory_gb;
    document.getElementById('dstatProcs').textContent = snap.running_processes.length;

    document.getElementById('infocpu').textContent    = snap.system.cpu_brand;
    document.getElementById('infoos').textContent     = `${snap.system.os_distro} ${snap.system.os_release}`;
    document.getElementById('infodisk').textContent   = `${snap.system.total_disk_size_gb} GB`;
    document.getElementById('infoports').textContent  = snap.network.listening_ports.length;
    document.getElementById('infonifaces').textContent = snap.network.interfaces.length;
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = snapshots.length;
    document.getElementById('todayCount').textContent = snapshots.filter(s => isToday(s.timestamp)).length;
    if (snapshots.length > 0) {
      document.getElementById('latestAge').textContent = timeAgo(snapshots[0].timestamp);
    } else {
      document.getElementById('latestAge').textContent = '—';
    }
  }

  async function init() {
    // In Electron, replace with:
    // const names = await window.ipc.invoke('list-snapshots');
    // then load each with window.ipc.invoke('load-snapshot', name)
    // For now use demo data:
    snapshots = DEMO_SNAPSHOTS;
    updateStats();
    renderList();
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    renderList(e.target.value);
  });

  init();
</script>
</body>
</html>
